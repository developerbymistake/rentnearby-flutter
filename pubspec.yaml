name: rentnearby
description: "RentNearBy - Find rooms near you, no brokers, no commission."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # HTTP
  dio: ^5.7.0

  # Local storage
  get_storage: ^2.1.1

  # Maps
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.2

  # Image picker
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Icons
  iconsax: ^0.0.8

  # URL launcher (WhatsApp)
  url_launcher: ^6.3.1

  # JWT decode
  jwt_decoder: ^2.0.1

  # Permission handler
  permission_handler: ^11.3.1

  # Cached network image
  cached_network_image: ^3.4.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
