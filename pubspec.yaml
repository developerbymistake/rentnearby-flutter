name: bakhli
description: "Bakhli — Discover your new address. No brokers, no commission."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # HTTP
  dio: ^5.7.0

  # Local storage
  get_storage: ^2.1.1
  flutter_secure_storage: ^10.2.0

  # Maps
  maplibre_gl: ^0.26.0

  # Location
  geolocator: ^14.0.2

  # Image picker
  image_picker: ^1.1.2

  # Animations
  animate_do: ^5.1.0
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Icons
  iconsax: ^0.0.8

  # URL launcher (WhatsApp)
  url_launcher: ^6.3.1

  # Native share sheet
  share_plus: ^12.0.2

  # Toast notifications
  toastification: ^3.2.0

  # OTP input
  pinput: ^6.0.2

  # JWT decode
  jwt_decoder: ^2.0.1

  # Permission handler
  permission_handler: ^12.0.1

  # Cached network image
  cached_network_image: ^3.4.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Audio
  audioplayers: ^6.1.0

  # Razorpay Payment
  razorpay_flutter: ^1.3.6

  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/map_style.json
    - assets/sprites/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
